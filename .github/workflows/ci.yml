# CI Workflow — Aroadri Tea ERP
# SD §26.1: lint → typecheck → test → build → docker → push GHCR
name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Lint + Typecheck + Test ──────────────────────────────────────────────
  check:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Permission lint
        run: pnpm lint:permissions

      - name: Typecheck offline
        run: pnpm --filter @erp/offline typecheck

      - name: Typecheck shared
        run: pnpm --filter @erp/shared typecheck

      - name: Typecheck db
        run: pnpm --filter @erp/db typecheck

      - name: Typecheck ui
        run: pnpm --filter @erp/ui typecheck

      - name: Typecheck ui-public
        run: pnpm --filter @erp/ui-public typecheck

      - name: Typecheck worker
        run: pnpm --filter @erp/worker typecheck

      - name: Typecheck services
        run: pnpm --filter @erp/services typecheck

      - name: Typecheck mcp
        run: pnpm --filter @erp/mcp typecheck

      - name: Typecheck site
        run: pnpm --filter @erp/site typecheck

      - name: Typecheck web
        run: pnpm --filter @erp/web typecheck

      - name: Test
        run: pnpm test -- --run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}

      - name: i18n parity
        run: node scripts/check-i18n.mjs

  # ── Build Docker Images ────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check
    if: github.event_name == 'push'

    strategy:
      matrix:
        include:
          - app: web
            dockerfile: docker/Dockerfile.web
          - app: site
            dockerfile: docker/Dockerfile.site
          - app: mcp
            dockerfile: docker/Dockerfile.mcp
          - app: worker
            dockerfile: docker/Dockerfile.worker

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
